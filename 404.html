<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada</title>
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .not-found {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .not-found__bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: radial-gradient(50% 45% at 50% 40%, rgba(214,169,77,0.07), transparent 70%);
  }
  .not-found__content { position: relative; z-index: 1; max-width: 480px; }
  .not-found__code {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(72px, 14vw, 120px);
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.03em;
  }
  .not-found__title {
    font-size: clamp(22px, 3vw, 28px);
    margin: 16px 0 12px;
  }
  .not-found__text {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 36px;
  }
  .not-found__actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .not-found__logo { margin-bottom: 48px; }
</style>
</head>
<body>

<div class="not-found">
  <div class="not-found__bg" aria-hidden="true"></div>
  <div class="not-found__content">
    <a href="index.html" class="logo not-found__logo" style="justify-content:center;" aria-label="Início">
      <img src="https://ik.imagekit.io/vqrugbo5f/imagens-vendas/logo.svg" alt="Logo" class="logo__img">
    </a>

    <span class="not-found__code">404</span>
    <h1 class="not-found__title">Essa página não foi encontrada.</h1>
    <p class="not-found__text">O link pode estar incorreto ou o conteúdo pode ter sido movido. Volte para a página inicial ou fale diretamente comigo pelo WhatsApp.</p>

    <div class="not-found__actions">
      <a href="index.html" class="btn btn--gold">Voltar ao início</a>
      <a href="https://wa.me/5522988283798" target="_blank" rel="noopener" class="btn btn--ghost">Falar no WhatsApp</a>
    </div>
  </div>
</div>

</body>
</html>
